<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入职工作天数计算</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    color: #333;
    margin-bottom: 24px;
    padding-top: 10px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card-title {
    font-size: 15px;
    color: #666;
    margin-bottom: 4px;
  }
  .card-date {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid #f0f0f0;
  }
  .stat-label {
    font-size: 14px;
    color: #555;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: #1677ff;
  }
  .stat-value small {
    font-size: 14px;
    font-weight: 400;
    color: #999;
  }
  .update-time {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📋 入职工作天数</h1>

  <div class="card">
    <div class="card-title">从实际入职日算起</div>
    <div class="card-date">2026年6月17日 → 今天</div>
    <div class="stat-row">
      <span class="stat-label">总日历天数</span>
      <span class="stat-value" id="total1">- <small>天</small></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">工作日天数</span>
      <span class="stat-value" id="work1">- <small>天</small></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">从合同签订日算起</div>
    <div class="card-date">2026年6月26日 → 今天</div>
    <div class="stat-row">
      <span class="stat-label">总日历天数</span>
      <span class="stat-value" id="total2">- <small>天</small></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">工作日天数</span>
      <span class="stat-value" id="work2">- <small>天</small></span>
    </div>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>

<script>
// ========== 2026年法定节假日（放假日期集合） ==========
// 数据来源：国务院办公厅关于2026年部分节假日安排的通知（国办发明电〔2025〕7号）
const holidays2026 = new Set([
  // 元旦：1月1日-3日
  '2026-01-01', '2026-01-02', '2026-01-03',
  // 春节：2月15日-23日
  '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18',
  '2026-02-19', '2026-02-20', '2026-02-21', '2026-02-22', '2026-02-23',
  // 清明节：4月4日-6日
  '2026-04-04', '2026-04-05', '2026-04-06',
  // 劳动节：5月1日-5日
  '2026-05-01', '2026-05-02', '2026-05-03', '2026-05-04', '2026-05-05',
  // 端午节：6月19日-21日
  '2026-06-19', '2026-06-20', '2026-06-21',
  // 中秋节：9月25日-27日
  '2026-09-25', '2026-09-26', '2026-09-27',
  // 国庆节：10月1日-7日
  '2026-10-01', '2026-10-02', '2026-10-03', '2026-10-04',
  '2026-10-05', '2026-10-06', '2026-10-07',
]);

// 调休上班日（周末但需要上班的日期）
const workdaysOnWeekend = new Set([
  '2026-01-04', // 元旦调休，周日上班
  '2026-02-14', // 春节调休，周六上班
  '2026-02-28', // 春节调休，周六上班
  '2026-05-09', // 劳动节调休，周六上班
  '2026-09-20', // 国庆节调休，周日上班
  '2026-10-10', // 国庆节调休，周六上班
]);

// 格式化日期为 YYYY-MM-DD
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// 判断某天是否为工作日
function isWorkday(date) {
  const key = formatDate(date);
  const dayOfWeek = date.getDay(); // 0=周日, 6=周六

  // 调休上班日 → 工作日
  if (workdaysOnWeekend.has(key)) return true;

  // 法定节假日 → 休息
  if (holidays2026.has(key)) return false;

  // 周六周日 → 休息
  if (dayOfWeek === 0 || dayOfWeek === 6) return false;

  // 其余为正常工作日
  return true;
}

// 计算从 start 到 end（含首尾两天）的总天数和工作日天数
function calcDays(startStr, end) {
  const start = new Date(startStr + 'T00:00:00');
  let totalDays = 0;
  let workDays = 0;
  const cur = new Date(start);

  while (cur <= end) {
    totalDays++;
    if (isWorkday(cur)) workDays++;
    cur.setDate(cur.getDate() + 1);
  }
  return { totalDays, workDays };
}

// ========== 主逻辑 ==========
const today = new Date();
today.setHours(0, 0, 0, 0);

const r1 = calcDays('2026-06-17', today);
const r2 = calcDays('2026-06-26', today);

document.getElementById('total1').innerHTML = `${r1.totalDays} <small>天</small>`;
document.getElementById('work1').innerHTML = `${r1.workDays} <small>天</small>`;
document.getElementById('total2').innerHTML = `${r2.totalDays} <small>天</small>`;
document.getElementById('work2').innerHTML = `${r2.workDays} <small>天</small>`;

const now = new Date();
document.getElementById('updateTime').textContent =
  `数据计算时间：${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
</script>
</body>
</html>
